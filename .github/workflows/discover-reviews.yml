name: Discover Hospitable reviews API (temporary)
on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Probe properties + reviews
        env:
          PAT: ${{ secrets.HOSPITABLE_PAT }}
        run: |
          AUTH="Authorization: Bearer $PAT"
          BASE="https://public.api.hospitable.com/v2"
          echo "===== /v2/properties ====="
          curl -s -H "$AUTH" -H "Accept: application/json" "$BASE/properties?per_page=50" -o props.json -w "HTTP:%{http_code}\n"
          echo "-- top-level keys --"; jq -r 'keys' props.json
          echo "-- property count in page --"; jq '.data | length' props.json
          echo "-- first property: field names (no values, privacy) --"; jq -r '.data[0] | keys' props.json
          echo "-- uuid -> picture (to extract numeric id for mapping) --"; jq -r '.data[] | .id + "  " + (.picture // "NONE" | tostring)' props.json | head -30
          echo "-- mapping check: uuid -> numeric id parsed from picture --"; jq -r '.data[] | .id + " -> " + ((.picture // "" | capture("property_images/(?<n>[0-9]+)/")?.n) // "NO-MATCH")' props.json | head -30
          echo
          echo "===== /v2/properties/{uuid}/reviews (first property) ====="
          UUID=$(jq -r '.data[0].id' props.json)
          curl -s -H "$AUTH" -H "Accept: application/json" "$BASE/properties/$UUID/reviews?per_page=50" -o revs.json -w "HTTP:%{http_code}\n"
          echo "-- top-level keys --"; jq -r 'keys' revs.json
          echo "-- reviews in page --"; jq '.data | length' revs.json
          echo "-- meta (look for total count) --"; jq '.meta' revs.json
          echo "-- first review: field names --"; jq -r '.data[0] | keys' revs.json
          echo "-- first review public block (rating scale!) --"; jq '.data[0].public' revs.json
          echo "-- distribution of public.rating values this page --"; jq '[.data[].public.rating]' revs.json
