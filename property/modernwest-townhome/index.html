<script>
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40);
  const bar = document.getElementById('sticky-bar');
  if (bar) bar.classList.toggle('show', window.scrollY > 420);
});

let lbPhotos = [], lbIdx = 0;
function openLB(photos, idx) { lbPhotos = photos; lbIdx = idx; document.getElementById('lb').classList.add('open'); renderLB(); }
function renderLB() { document.getElementById('lb-img').src = lbPhotos[lbIdx]; document.getElementById('lb-counter').textContent = `${lbIdx+1} / ${lbPhotos.length}`; }
function lbNav(dir) { lbIdx = (lbIdx + dir + lbPhotos.length) % lbPhotos.length; renderLB(); }
function closeLB(e) { if (e.target === document.getElementById('lb')) document.getElementById('lb').classList.remove('open'); }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape') document.getElementById('lb').classList.remove('open');
});

  const pageDesc = `${prop.meta} in ${cityFull}. Book direct with Lake City Flats and save ~15% vs. Airbnb. No service fees.`;
  const pageUrl = location.href;
  const pageImg = prop.photos[0] || prop.image;

  document.title = pageTitle;
  document.querySelector('meta[name="description"]').content = pageDesc;
  document.querySelector('meta[property="og:title"]').content = pageTitle;
  document.querySelector('meta[property="og:description"]').content = pageDesc;
  document.querySelector('meta[property="og:image"]').content = pageImg;
  document.querySelector('meta[property="og:url"]').content = pageUrl;
  document.querySelector('meta[name="twitter:title"]').content = pageTitle;
  document.querySelector('meta[name="twitter:description"]').content = pageDesc;
  document.querySelector('meta[name="twitter:image"]').content = pageImg;

  const stateCode = prop.city === 'slc' ? 'UT' : 'MI';
  const jsonLd = {
    "@context": "https://schema.org",
    "@type": "LodgingBusiness",
    "name": prop.name,
    "description": prop.description,
    "url": pageUrl,
    "image": prop.photos,
    "address": {
      "@type": "PostalAddress",
      "addressLocality": cityFull,
      "addressRegion": stateCode,
      "addressCountry": "US"
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": prop.rating,
      "reviewCount": parseInt(prop.review_count) || 10,
      "bestRating": "5"
    },
    "amenityFeature": prop.amenities.map(a => ({"@type":"LocationFeatureSpecification","name":a,"value":true})),
    "numberOfRooms": prop.beds,
    "occupancy": {"@type":"QuantitativeValue","maxValue":prop.sleeps},
    "petsAllowed": false,
    "telephone": "+18016571028",
    "email": "contact@lakecityflats.com"
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.text = JSON.stringify(jsonLd);
  document.head.appendChild(s);

  // Wire "Book Direct" nav + sticky bar to open Hospitable booking engine
  if (prop.hospitable_id) {
    const bookingUrl = `https://booking.hospitable.com/widget/643ae633-bfb6-4a6f-bd85-e6294860ddfc/${prop.hospitable_id}`;
    const navBtn = document.querySelector('.nav-book');
    if (navBtn) { navBtn.href = bookingUrl; navBtn.target = '_blank'; navBtn.rel = 'noopener noreferrer'; }
  }

  const isSlc = prop.city === 'slc';
  const cityLabel = cityFull;
  const hoodLabel = prop.hood.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const similar = data.properties.filter(p => p.city === prop.city && p.id !== prop.id).slice(0,3);
  const photos = prop.photos;
  // Safe attribute value: replace " with &quot; so JSON inside onclick="..." doesn't break the attribute
  const pd = JSON.stringify(photos).replace(/"/g, '&quot;');

  function subCell(i) {
    if (i >= photos.length) return '';
    return `<div class="pp-gallery-sub-img" onclick="openLB(${pd},${i})"><img src="${photos[i]}" alt="${prop.name}" loading="lazy"></div>`;
  }

  const viewAllIdx = photos.length - 1;
  const viewAllPhoto = photos[viewAllIdx];
  // Only show sub cells that have photos; pad to 4 total slots (3 sub + view-all)
  const subCells = [subCell(1), subCell(2), subCell(3)].filter(Boolean).join('');
  const galleryHTML = `
    <div class="pp-gallery">
      <div class="pp-gallery-main"><img class="pp-gallery-main-img" src="${photos[0]}" alt="${prop.name}" onclick="openLB(${pd},0)"></div>
      ${photos.length > 1 ? `<div class="pp-gallery-sub">
        ${subCells}
        <div class="pp-gallery-sub-img" style="position:relative;" onclick="openLB(${pd},${viewAllIdx})">
          <img src="${viewAllPhoto}" alt="${prop.name}" loading="lazy">
          <div class="pp-gallery-more">View all ${photos.length} photos</div>
        </div>
      </div>` : ''}
    </div>`;

  const amenitiesHTML = prop.amenities.map(a=>`<div class="pp-amenity">${a}</div>`).join('');
  const reviewsHTML = prop.reviews.map(r=>`
    <div class="pp-review">
      <div class="pp-review-top">
        <div class="pp-review-av">${r.name[0]}</div>
        <div><div class="pp-review-name">${r.name}</div><div class="pp-review-meta">${r.date} · ${r.source}</div></div>
        <div class="pp-review-stars">★★★★★</div>
      </div>
      <div class="pp-review-text">${r.text}</div>
    </div>`).join('');

  const featuresHTML = [
    `<span class="pp-badge pp-badge-loc">${isSlc?'🏔':'🏛'} ${cityLabel}</span>`,
    `<span class="pp-badge pp-badge-loc">${hoodLabel}</span>`,
    ...prop.features.map(f=>`<span class="pp-badge pp-badge-feat">${f}</span>`)
  ].join('');

  const similarHTML = similar.map(s=>`
    <a href="../${s.id}/" class="pp-sim-card">
      <div class="pp-sim-img" style="background-image:url('${s.image}')"></div>
      <div class="pp-sim-body">
        <div class="pp-sim-name">${s.name}</div>
        <div class="pp-sim-meta">${s.meta}</div>
        <div class="pp-sim-rating">★ ${s.rating}</div>
      </div>
    </a>`).join('');

  document.getElementById('pp-root').innerHTML = `
    <div class="pp-breadcrumb-bar">
      <a href="../../index.html">Home</a><span>›</span>
      <a href="../../#${isSlc?'slc':'detroit'}">${cityLabel}</a><span>›</span>
      <span>${prop.name}</span>
    </div>

    ${galleryHTML}

    <div class="pp-body">
      <div>
        <div class="pp-badges">${featuresHTML}</div>
        <h1 class="pp-title">${prop.name}</h1>
        <div class="pp-meta">
          <span>${prop.beds} bedroom${prop.beds!==1?'s':''} · ${prop.baths} bath${prop.baths!==1?'s':''}</span>
          <div class="pp-meta-dot"></div>
          <span>Sleeps ${prop.sleeps}</span>
          <div class="pp-meta-dot"></div>
          <span class="pp-rating">★ ${prop.rating} · ${prop.review_count} reviews</span>
        </div>
        <p class="pp-desc">${prop.description}</p>

        <div class="pp-section">
          <div class="pp-section-label">What's included</div>
          <div class="pp-amenity-grid">${amenitiesHTML}</div>
        </div>

        <div class="pp-section">
          <div class="pp-section-label">Location</div>
          <div class="pp-map-stub">📍 ${hoodLabel} · ${cityLabel}</div>
          <div class="pp-location-desc">${prop.neighborhood_desc}</div>
        </div>

        <div class="pp-section">
          <div class="pp-section-label">What guests say · ★ ${prop.rating} · ${prop.review_count} reviews</div>
          ${reviewsHTML}
          <a href="${prop.url}" rel="noopener noreferrer" target="_blank" style="font-size:12px;color:var(--forest-light);text-decoration:none;border-bottom:1px solid currentColor;padding-bottom:1px;display:inline-block;margin-top:4px;">Read all reviews on Airbnb →</a>
        </div>
      </div>

      <div class="pp-right" id="book">
        <div class="pp-nudge">Book direct → <strong>save ~15%</strong> vs. Airbnb. No service fees.</div>
        <div class="pp-widget-wrapper">
          <div class="pp-direct-banner"><span class="pp-direct-icon">🤝</span><span>Direct booking · Secure via Stripe · $5M protection</span></div>
          <div class="pp-trust-row">
            <div class="pp-trust-item"><div class="pp-trust-item-icon">🔒</div><div class="pp-trust-item-label">Stripe</div></div>
            <div class="pp-trust-item"><div class="pp-trust-item-icon">⚡</div><div class="pp-trust-item-label">Instant confirm</div></div>
            <div class="pp-trust-item"><div class="pp-trust-item-icon">🛡</div><div class="pp-trust-item-label">$5M cover</div></div>
          </div>
          ${prop.hospitable_id ? `
          <iframe
            id="booking-iframe"
            sandbox="allow-top-navigation-by-user-activation allow-scripts allow-same-origin allow-forms allow-popups"
            style="width:100%;height:900px;border:none;display:block;"
            frameborder="0"
            src="https://booking.hospitable.com/widget/643ae633-bfb6-4a6f-bd85-e6294860ddfc/${prop.hospitable_id}">
          </iframe>
          <div class="pp-mobile-book">
            <div class="pp-mobile-book-label">Check availability &amp; book direct</div>
            <a href="https://booking.hospitable.com/widget/643ae633-bfb6-4a6f-bd85-e6294860ddfc/${prop.hospitable_id}" target="_blank" rel="noopener noreferrer" class="pp-cta-primary">Open booking calendar →</a>
            <p class="pp-mobile-book-note">Secure via Stripe · No Airbnb service fees · Save ~15%</p>
          </div>` : `
          <div class="pp-cta-block">
            <a href="${prop.url}" rel="noopener noreferrer" target="_blank" class="pp-cta-primary">Check availability →</a>
            <a href="mailto:contact@lakecityflats.com?subject=Inquiry: ${encodeURIComponent(prop.name)}" class="pp-cta-secondary">Ask us anything</a>
          </div>`}
          <div style="padding:8px 16px 14px;text-align:center;">
            <a href="${prop.url}" rel="noopener noreferrer" target="_blank" style="font-size:11px;color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--muted);">Also on Airbnb (fees apply)</a>
          </div>
        </div>
        <div style="margin-top:16px;padding:16px;background:var(--parchment);border-radius:3px;border:1px solid var(--border);">
          <div style="font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--terra);margin-bottom:8px;">From the hosts</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:14.5px;font-style:italic;color:var(--ink);line-height:1.7;">"We own and operate every property ourselves. If something isn't right, reach us directly — not a support queue."</div>
          <div style="font-size:11px;color:var(--muted);margin-top:10px;">📞 <a href="tel:18016571028" style="color:var(--muted);text-decoration:none;">801-657-1028</a> &nbsp;·&nbsp; <a href="mailto:contact@lakecityflats.com" style="color:var(--muted);text-decoration:none;">contact@lakecityflats.com</a></div>
        </div>
      </div>
    </div>

    <div class="pp-sticky-bar" id="sticky-bar">
      <div>
        <div class="pp-sticky-price">★ ${prop.rating} <span>· ${prop.review_count} reviews</span></div>
        <div style="font-size:10px;color:var(--muted);margin-top:1px;">Save ~15% booking direct</div>
      </div>
      <a href="${prop.hospitable_id ? `https://booking.hospitable.com/widget/643ae633-bfb6-4a6f-bd85-e6294860ddfc/${prop.hospitable_id}` : '#book'}" target="_blank" rel="noopener noreferrer" class="pp-sticky-btn">Book direct →</a>
    </div>

    ${similar.length>0?`
    <section class="pp-similar">
      <div class="pp-similar-head">
        <div class="section-eyebrow">More in ${cityLabel}</div>
        <h2 class="pp-similar-title">You might also like</h2>
      </div>
      <div class="pp-similar-grid">${similarHTML}</div>
    </section>`:''}
  `;
}

init();
</script>
</body>
</html>
